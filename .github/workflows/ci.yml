name: CI/CD — Trilhas da Infância

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type-check ──────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install API deps
        run: cd apps/api && npm ci

      - name: Install Web deps
        run: cd apps/web && npm ci

      - name: Type-check API
        run: cd apps/api && npx tsc --noEmit

      - name: Type-check Web
        run: cd apps/web && npx tsc --noEmit

  # ── API Tests ──────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: trilhas_test
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: trilhas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: cd apps/api && npm ci

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate
        env:
          DATABASE_URL: postgresql://trilhas_test:test123@localhost:5432/trilhas_test

      - name: Run migrations
        run: cd apps/api && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://trilhas_test:test123@localhost:5432/trilhas_test

  # ── Build check ────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Web deps
        run: cd apps/web && npm ci

      - name: Build Next.js
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.placeholder.railway.app
